<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allowance Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-6">
        <h1 class="text-xl font-bold mb-4">Allowance Calculator</h1>

        <div class="mb-6">
            <label class="block font-bold mb-1">Base Salary (THB):</label>
            <input id="baseSalary" type="number" class="w-full border p-2 rounded" placeholder="0" oninput="calculate()">
        </div>

        <div id="flightContainer" class="space-y-3">
            <h2 class="font-bold">Select Flights</h2>
            <div class="flight-row flex gap-2">
                <select class="flight-select w-full border p-2 rounded" onchange="calculate()">
                    <option value="0">Select a flight...</option>
                    <option value="7850.50">315 - DEL (7,850.50)</option>
                    <option value="4860.00">401 - SIN (4,860.00)</option>
                    <option value="13830.00">461 - MEL (13,830.00)</option>
                </select>
            </div>
        </div>

        <button id="addFlightBtn" class="w-full mt-4 border-2 border-dashed border-gray-300 p-2 rounded text-gray-500 hover:bg-gray-100">
            + Add flight
        </button>

        <div class="mt-6 p-4 bg-blue-50 rounded-xl text-center">
            <p class="text-sm text-blue-600">Total Allowance:</p>
            <span id="totalAmount" class="text-3xl font-bold text-blue-700">0</span>
        </div>
    </div>

    <script>
        const flightContainer = document.getElementById('flightContainer');
        const addFlightBtn = document.getElementById('addFlightBtn');

        // ฟังก์ชันคำนวณ (เรียกใช้ได้ทุกที่เพราะวางไว้ใน HTML แล้ว)
        function calculate() {
            let total = parseFloat(document.getElementById('baseSalary').value) || 0;
            document.querySelectorAll('.flight-select').forEach(select => {
                total += parseFloat(select.value) || 0;
            });
            document.getElementById('totalAmount').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        // ฟังก์ชันเพิ่มแถว
        addFlightBtn.addEventListener('click', () => {
            const newRow = document.createElement('div');
            newRow.className = 'flight-row flex gap-2';
            newRow.innerHTML = `
                <select class="flight-select w-full border p-2 rounded" onchange="calculate()">
                    <option value="0">Select a flight...</option>
                    <option value="7850.50">315 - DEL (7,850.50)</option>
                    <option value="4860.00">401 - SIN (4,860.00)</option>
                    <option value="13830.00">461 - MEL (13,830.00)</option>
                </select>
                <button onclick="this.parentElement.remove(); calculate();" class="bg-red-100 text-red-600 px-3 rounded">×</button>
            `;
            flightContainer.appendChild(newRow);
        });
    </script>
</body>
</html>
